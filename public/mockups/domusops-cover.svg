  <rect x="20" y="62" width="238" height="68" rx="3" fill="#161513" stroke="#d4a664" stroke-opacity="0.30" stroke-width="1"/>
  <rect x="20" y="62" width="4" height="68" rx="2" fill="#d4a664"/>
